name = "community-proof-board-cloudflare"
main = "src/worker.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "community-proof-board"
database_id = "73acbebc-0858-4489-a612-8d47922e84e0"

[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "community-proof-board-images"

[browser]
binding = "BROWSER"

[vars]
SESSION_COOKIE_NAME = "cpb_session"
LOCAL_CAPTURE_ENDPOINT = "https://lunch-interracial-dating-muscles.trycloudflare.com/capture"
LOCAL_CAPTURE_HOSTS = "fmkorea.com,www.fmkorea.com"

# Configure SESSION_SECRET in Cloudflare dashboard or with wrangler secret put.
