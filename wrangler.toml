name = "community-proof-board-cloudflare"
main = "src/worker.js"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "community-proof-board"
database_id = "73acbebc-0858-4489-a612-8d47922e84e0"

[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "community-proof-board-images"

[browser]
binding = "BROWSER"

[vars]
SESSION_COOKIE_NAME = "cpb_session"

# 실제 배포 시 Cloudflare Dashboard 또는 wrangler secret put 으로 설정
# SESSION_SECRET

# 서브도메인 연결은 deploy 후 Dashboard의 Workers Routes / Custom Domains 에서 설정
